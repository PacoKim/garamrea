<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가람부동산 | 블로그 상세보기</title>
  
  <!-- 아이콘: FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  
  <!-- Quill.js CSS (for content rendering) -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  
  <style>
    .post-detail-container {
      max-width: 900px;
      margin: 140px auto 100px;
      padding: 0 20px;
    }
    
    .post-header {
      text-align: center;
      margin-bottom: 60px;
      padding-bottom: 40px;
      border-bottom: 1px solid var(--border-subtle);
    }
    
    .post-category {
      display: inline-block;
      padding: 6px 16px;
      background: var(--accent-glow);
      color: var(--accent-primary);
      border-radius: var(--radius-full);
      font-size: 0.875rem;
      font-weight: 700;
      margin-bottom: 20px;
    }
    
    .post-title {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 900;
      line-height: 1.3;
      margin-bottom: 24px;
      color: var(--accent-navy);
    }
    
    .post-meta {
      display: flex;
      justify-content: center;
      gap: 24px;
      font-size: 0.9375rem;
      color: var(--text-tertiary);
    }
    
    .post-meta span i {
      color: var(--accent-primary);
      margin-right: 8px;
    }
    
    /* Content Styling (Quill) */
    .post-body {
      background: var(--bg-card);
      padding: 60px;
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-card);
      border: 1px solid var(--border-subtle);
    }
    
    .ql-editor {
      padding: 0;
      font-size: 1.125rem;
      line-height: 1.8;
      color: var(--text-primary);
    }
    
    .back-nav {
      margin-top: 40px;
      display: flex;
      justify-content: center;
    }

    @media (max-width: 768px) {
      .post-detail-container { margin-top: 100px; }
      .post-body { padding: 30px; }
      .post-title { font-size: 1.75rem; }
    }
  </style>
</head>
<body>

  <!-- ====== Navigation ====== -->
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="nav-logo">가람부동산<span>.</span></a>
      <div class="nav-links">
        <a href="index.html#featured" class="nav-link">추천매물</a>
        <a href="index.html#process" class="nav-link">중개과정</a>
        <a href="blog.html" class="nav-link">블로그</a>
        <a href="index.html#faq" class="nav-link">FAQ</a>
      </div>
      <a href="tel:010-7600-2104" class="nav-cta">📞 상담문의</a>
      <button class="nav-mobile-toggle" id="mobileToggle" aria-label="메뉴 열기">
        <div class="hamburger"><span></span><span></span><span></span></div>
      </button>
    </div>
  </nav>

  <!-- ====== Mobile Menu ====== -->
  <div class="mobile-menu" id="mobileMenu">
    <button class="mobile-close" id="mobileClose" aria-label="메뉴 닫기">✕</button>
    <a href="index.html#featured" onclick="closeMobile()">추천매물</a>
    <a href="index.html#process" onclick="closeMobile()">중개과정</a>
    <a href="blog.html" onclick="closeMobile()">블로그</a>
    <a href="index.html#faq" onclick="closeMobile()">FAQ</a>
    <a href="tel:010-7600-2104" onclick="closeMobile()" class="btn btn-primary" style="margin-top:16px;">📞 전화 상담</a>
  </div>

  <!-- ====== Blog Detail Content ====== -->
  <main class="post-detail-container">
    <div id="postError" style="display:none; text-align:center; padding:100px 0;">
      <h2 style="margin-bottom:20px;">게시글을 찾을 수 없습니다.</h2>
      <a href="blog.html" class="btn btn-primary">목록으로 돌아가기</a>
    </div>

    <div id="postContentArea" style="display:none;">
      <header class="post-header reveal">
        <span class="post-category" id="detailCategory">부동산 소식</span>
        <h1 class="post-title" id="detailTitle">제목을 불러오고 있습니다...</h1>
        <div class="post-meta">
          <span><i class="fa-solid fa-calendar"></i> <span id="detailDate"></span></span>
          <span><i class="fa-solid fa-user"></i> <span id="detailAuthor"></span></span>
        </div>
      </header>

      <article class="post-body reveal reveal-delay-1">
        <div class="ql-snow">
          <div class="ql-editor" id="detailContent">
            <!-- Content Rendered Here -->
          </div>
        </div>
      </article>

      <div class="back-nav reveal reveal-delay-2">
        <a href="blog.html" class="btn btn-secondary">
          <i class="fa-solid fa-arrow-left"></i> 목록으로 돌아가기
        </a>
      </div>
    </div>
  </main>

  <!-- ====== Footer ====== -->
  <footer class="footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-brand">
          <a href="index.html" class="nav-logo" style="font-size:1.25rem; color:white;">가람부동산<span style="color:#D4AF37;">.</span></a>
          <p>전문적인 가이드와 정확한 정보로 고객님의 성공적인 거래를 돕습니다.</p>
        </div>
        <div class="footer-col">
          <h4>메뉴</h4>
          <a href="index.html">홈으로</a>
          <a href="blog.html">블로그 목록</a>
        </div>
        <div class="footer-col">
          <h4>문의</h4>
          <a href="tel:010-7600-2104">📞 010-7600-2104</a>
        </div>
      </div>
      <div class="footer-bottom">
        <span>© 2026 가람부동산. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>

  <!-- Firebase SDK -->
  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
    }
  }
  </script>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getFirestore, doc, getDoc } from "firebase/firestore";

    const firebaseConfig = {
      apiKey: "AIzaSyC4bxl2efr-a2qlCv9zclP-kaL106Bpvxc",
      authDomain: "garambudongsan.firebaseapp.com",
      projectId: "garambudongsan",
      storageBucket: "garambudongsan.firebasestorage.app",
      messagingSenderId: "610338625520",
      appId: "1:610338625520:web:7c113deb9334a302b62f35"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const fbId = urlParams.get('fbid');

      if (!fbId) {
        document.getElementById('postError').style.display = 'block';
        return;
      }

      try {
        const docSnap = await getDoc(doc(db, "posts", fbId));
        if (docSnap.exists()) {
          const p = docSnap.data();
          document.getElementById('detailCategory').textContent = p.category;
          document.getElementById('detailTitle').textContent = p.title;
          document.getElementById('detailDate').textContent = p.date;
          document.getElementById('detailAuthor').textContent = p.author;
          document.getElementById('detailContent').innerHTML = p.content || `<p>${p.excerpt}</p>`;
          document.getElementById('postContentArea').style.display = 'block';
          
          // Re-trigger scroll reveal
          document.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));
        } else {
          document.getElementById('postError').style.display = 'block';
        }
      } catch (e) {
        console.error(e);
        document.getElementById('postError').style.display = 'block';
      }
    });
  </script>
</body>
</html>
