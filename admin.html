<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 대시보드 | 가람부동산</title>
  
  <!-- 아이콘: FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  
  <!-- Quill.js Editor CSS -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  
  <style>
    body { background: var(--bg-alt); padding-top: 80px; }
    
    .admin-nav {
      background: var(--accent-navy);
      color: white;
      padding: 0 5%;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      box-shadow: var(--shadow-md);
    }
    
    .admin-container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
    }
    
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 40px;
    }
    
    .admin-tabs {
      display: flex;
      gap: 8px;
    }
    
    .admin-tab {
      padding: 12px 24px;
      background: transparent;
      border: none;
      color: var(--text-tertiary);
      font-weight: 700;
      cursor: pointer;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      transition: var(--transition-base);
    }
    
    .admin-tab.active {
      background: var(--bg-card);
      color: var(--accent-primary);
      box-shadow: 0 -4px 10px rgba(0,0,0,0.03);
    }
    
    .admin-section {
      display: none;
      background: var(--bg-card);
      padding: 40px;
      border-radius: 0 var(--radius-2xl) var(--radius-2xl) var(--radius-2xl);
      box-shadow: var(--shadow-xl);
      border: 1px solid var(--border-subtle);
      animation: fadeIn 0.4s ease;
    }
    
    .admin-section.active { display: block; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .form-group-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
      margin-bottom: 30px;
    }
    
    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      font-size: 0.9375rem;
      transition: var(--transition-base);
    }
    
    .form-input:focus {
      border-color: var(--accent-primary);
      outline: none;
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    
    .image-upload-box {
      border: 2px dashed var(--border-strong);
      border-radius: var(--radius-lg);
      height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      background: var(--bg-alt);
      transition: var(--transition-base);
    }
    
    .image-upload-box:hover { border-color: var(--accent-primary); background: white; }
    .image-upload-box img { width: 100%; height: 100%; object-fit: cover; }
    
    .area-box {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-alt);
      padding: 12px;
      border-radius: var(--radius-md);
      font-weight: 700;
      color: var(--accent-primary);
    }
    
    .admin-list {
      margin-top: 60px;
      border-top: 2px solid var(--border-subtle);
      padding-top: 40px;
    }
    
    .admin-list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      padding: 20px 30px;
      border-radius: var(--radius-xl);
      margin-bottom: 16px;
      border: 1px solid var(--border-subtle);
      transition: var(--transition-base);
    }
    
    .admin-list-item:hover { border-color: var(--accent-primary); transform: translateX(5px); }
    
    .item-info h4 { font-size: 1.125rem; font-weight: 800; margin-bottom: 4px; }
    .item-info p { font-size: 0.875rem; color: var(--text-tertiary); }
    
    .btn-delete {
      background: #fee2e2;
      color: #ef4444;
      border: none;
      padding: 8px 16px;
      border-radius: var(--radius-md);
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
    }
    
    .btn-delete:hover { background: #fecaca; }
    
    .editor-container { margin-bottom: 30px; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-strong); }
    .ql-toolbar { background: var(--bg-alt); border: none !important; border-bottom: 1px solid var(--border-strong) !important; }
    .ql-container { height: 400px; border: none !important; font-size: 1rem; }
  </style>
</head>
<body>

  <div id="auth-check" style="display:none;">
    <nav class="admin-nav">
      <a href="index.html" class="nav-logo" style="color:white;">가람부동산<span>.</span> <small style="font-size:12px; opacity:0.7;">Admin</small></a>
      <button class="btn btn-secondary" onclick="logout()" style="background:rgba(255,255,255,0.1); border:none; color:white;">로그아웃</button>
    </nav>

    <main class="admin-container">
      <div class="admin-header">
        <div>
          <h1 style="font-weight:900; margin-bottom:8px;">관리자 대시보드</h1>
          <p style="color:var(--text-tertiary);">매물 및 블로그 콘텐츠를 관리하세요.</p>
        </div>
        <div class="admin-tabs">
          <button class="admin-tab active" onclick="switchTab('property')">매물 관리</button>
          <button class="admin-tab" onclick="switchTab('blog')">블로그 관리</button>
        </div>
      </div>

      <!-- Property Management -->
      <section id="property-section" class="admin-section active">
        <h2 style="margin-bottom:30px;">새 매물 등록</h2>
        <form id="property-form">
          <div class="form-group-grid">
            <div style="grid-row: span 2;">
              <label class="form-label">매물 사진</label>
              <div class="image-upload-box" onclick="document.getElementById('p-image-file').click()" id="p-preview-box">
                <i class="fa-solid fa-cloud-arrow-up" style="font-size:2rem; margin-bottom:10px; opacity:0.3;"></i>
                <span style="font-size:12px; opacity:0.5;">사진을 업로드하세요</span>
              </div>
              <input type="file" id="p-image-file" hidden accept="image/*" onchange="previewImage(this)">
              <input type="hidden" id="p-image-base64">
            </div>
            <div>
              <label class="form-label">매물 제목 (아파트명 등)</label>
              <input type="text" id="p-title" class="form-input" placeholder="상무 센트럴자이" required>
            </div>
            <div>
              <label class="form-label">주소</label>
              <input type="text" id="p-address" class="form-input" placeholder="광주광역시 서구 치평동">
            </div>
            <div>
              <label class="form-label">거래 종류</label>
              <select id="p-deal-type" class="form-input">
                <option value="매매">매매</option>
                <option value="전세">전세</option>
                <option value="월세">월세</option>
              </select>
            </div>
            <div>
              <label class="form-label">매물 종류</label>
              <select id="p-type" class="form-input">
                <option value="아파트">아파트</option>
                <option value="주택">주택</option>
                <option value="상가">상가</option>
                <option value="토지">토지</option>
                <option value="건물">건물</option>
                <option value="분양권">분양권</option>
              </select>
            </div>
            <div>
              <label class="form-label">가격</label>
              <input type="text" id="p-price" class="form-input" placeholder="12억 5,000만" required>
            </div>
            <div>
              <label class="form-label">면적 (㎡)</label>
              <div style="display:flex; gap:10px;">
                <input type="number" id="p-area-num" class="form-input" placeholder="112" step="0.1" oninput="liveUpdateArea(this.value)">
                <div class="area-box" id="p-area-res">㎡ (0평)</div>
              </div>
            </div>
            <div>
              <label class="form-label">방 / 욕실</label>
              <div style="display:flex; gap:10px;">
                <input type="number" id="p-beds" class="form-input" value="3" placeholder="방">
                <input type="number" id="p-baths" class="form-input" value="2" placeholder="욕실">
              </div>
            </div>
          </div>
          <div style="margin-bottom:30px;">
            <label class="form-label">상세 설명</label>
            <textarea id="p-desc" class="form-input" style="height:120px;" placeholder="매물에 대한 자세한 설명을 입력하세요."></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:18px;">매물 등록 완료</button>
        </form>

        <div class="admin-list">
          <h3 style="margin-bottom:20px;">등록된 매물 관리</h3>
          <div id="property-list">
            <p>데이터를 불러오는 중...</p>
          </div>
        </div>
      </section>

      <!-- Blog Management -->
      <section id="blog-section" class="admin-section">
        <h2 style="margin-bottom:30px;">새 블로그 작성</h2>
        <form id="blog-form">
          <div class="form-group-grid">
            <div style="grid-row: span 2;">
              <label class="form-label">대표 이미지</label>
              <div class="image-upload-box" onclick="document.getElementById('b-image-file').click()" id="b-preview-box">
                <i class="fa-solid fa-image" style="font-size:2rem; margin-bottom:10px; opacity:0.3;"></i>
                <span style="font-size:12px; opacity:0.5;">이미지를 선택하세요</span>
              </div>
              <input type="file" id="b-image-file" hidden accept="image/*" onchange="previewBlogImage(this)">
              <input type="hidden" id="b-image-base64">
            </div>
            <div>
              <label class="form-label">글 제목</label>
              <input type="text" id="b-title" class="form-input" placeholder="광주 서구 부동산 전망" required>
            </div>
            <div>
              <label class="form-label">카테고리</label>
              <input type="text" id="b-category" class="form-input" placeholder="부동산 인사이트" required>
            </div>
            <div>
              <label class="form-label">작성자</label>
              <input type="text" id="b-author" class="form-input" value="가람부동산" required>
            </div>
          </div>
          <div style="margin-bottom:30px;">
            <label class="form-label">요약 (목록에 표시될 내용)</label>
            <textarea id="b-excerpt" class="form-input" style="height:80px;" placeholder="글에 대한 짧은 요약을 입력하세요." required></textarea>
          </div>
          <div style="margin-bottom:30px;">
            <label class="form-label">본문 내용</label>
            <div class="editor-container">
              <div id="blog-editor"></div>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:18px;">포스트 발행하기</button>
        </form>

        <div class="admin-list">
          <h3 style="margin-bottom:20px;">발행된 블로그 관리</h3>
          <div id="blog-list">
            <p>데이터를 불러오는 중...</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

  <!-- Firebase SDK -->
  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
    }
  }
  </script>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "firebase/firestore";

    const firebaseConfig = {
      apiKey: "AIzaSyC4bxl2efr-a2qlCv9zclP-kaL106Bpvxc",
      authDomain: "garambudongsan.firebaseapp.com",
      projectId: "garambudongsan",
      storageBucket: "garambudongsan.firebasestorage.app",
      messagingSenderId: "610338625520",
      appId: "1:610338625520:web:7c113deb9334a302b62f35"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const quill = new Quill('#blog-editor', {
      theme: 'snow',
      modules: {
        toolbar: [
          [{ 'header': [1, 2, 3, false] }],
          ['bold', 'italic', 'underline'],
          ['blockquote', 'link', 'image'],
          [{ 'list': 'ordered'}, { 'list': 'bullet' }],
          ['clean']
        ]
      }
    });

    if(sessionStorage.getItem('isAdmin') !== 'true') {
      window.location.href = 'admin-login.html';
    } else {
      document.getElementById('auth-check').style.display = 'block';
    }

    window.logout = () => { sessionStorage.removeItem('isAdmin'); window.location.href = 'index.html'; };

    window.switchTab = (type) => {
      document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
      if(type === 'property') {
        document.querySelector('.admin-tab:first-child').classList.add('active');
        document.getElementById('property-section').classList.add('active');
      } else {
        document.querySelector('.admin-tab:last-child').classList.add('active');
        document.getElementById('blog-section').classList.add('active');
      }
    };

    window.previewImage = (input) => {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
          document.getElementById('p-preview-box').innerHTML = `<img src="${e.target.result}">`;
          document.getElementById('p-image-base64').value = e.target.result;
        }
        reader.readAsDataURL(input.files[0]);
      }
    };

    window.previewBlogImage = (input) => {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
          document.getElementById('b-preview-box').innerHTML = `<img src="${e.target.result}">`;
          document.getElementById('b-image-base64').value = e.target.result;
        }
        reader.readAsDataURL(input.files[0]);
      }
    };

    window.liveUpdateArea = (val) => {
      const m2 = parseFloat(val) || 0;
      document.getElementById('p-area-res').innerText = `㎡ (${(m2 * 0.3025).toFixed(1)}평)`;
    };

    document.getElementById('property-form').onsubmit = async (e) => {
      e.preventDefault();
      const img = document.getElementById('p-image-base64').value;
      if(!img) return alert('사진을 등록하세요.');
      const dealType = document.getElementById('p-deal-type').value;
      const bColor = dealType === '매매' ? '#D4AF37' : (dealType === '전세' ? '#22c55e' : '#0F172A');
      
      const newProp = {
        title: document.getElementById('p-title').value,
        address: document.getElementById('p-address').value,
        badge: dealType,
        badgeColor: bColor,
        price: document.getElementById('p-price').value,
        type: document.getElementById('p-type').value,
        area: `${document.getElementById('p-area-num').value}㎡ (${(parseFloat(document.getElementById('p-area-num').value)*0.3025).toFixed(1)}평)`,
        beds: document.getElementById('p-beds').value,
        baths: document.getElementById('p-baths').value,
        description: document.getElementById('p-desc').value,
        image: img,
        createdAt: new Date()
      };

      try {
        await addDoc(collection(db, "properties"), newProp);
        alert('매물이 등록되었습니다.');
        location.reload();
      } catch (err) { alert(err.message); }
    };

    document.getElementById('blog-form').onsubmit = async (e) => {
      e.preventDefault();
      const img = document.getElementById('b-image-base64').value;
      if(!img) return alert('대표 이미지를 등록하세요.');
      
      const newPost = {
        title: document.getElementById('b-title').value,
        category: document.getElementById('b-category').value,
        author: document.getElementById('b-author').value,
        excerpt: document.getElementById('b-excerpt').value,
        content: quill.root.innerHTML,
        image: img,
        date: new Date().toLocaleDateString('ko-KR').replace(/\. /g, '-').replace('.', ''),
        createdAt: new Date()
      };

      try {
        await addDoc(collection(db, "posts"), newPost);
        alert('포스트가 발행되었습니다.');
        location.reload();
      } catch (err) { alert(err.message); }
    };

    async function renderLists() {
      const pList = document.getElementById('property-list');
      const bList = document.getElementById('blog-list');

      const pSnap = await getDocs(query(collection(db, "properties"), orderBy("createdAt", "desc")));
      pList.innerHTML = pSnap.empty ? '<p>등록된 매물이 없습니다.</p>' : '';
      pSnap.forEach(fbDoc => {
        const p = fbDoc.data();
        pList.innerHTML += `
          <div class="admin-list-item">
            <div class="item-info"><h4>${p.title}</h4><p>${p.badge} | ${p.price} | ${p.area}</p></div>
            <button class="btn-delete" onclick="deleteItem('properties', '${fbDoc.id}')">삭제</button>
          </div>
        `;
      });

      const bSnap = await getDocs(query(collection(db, "posts"), orderBy("createdAt", "desc")));
      bList.innerHTML = bSnap.empty ? '<p>발행된 포스트가 없습니다.</p>' : '';
      bSnap.forEach(fbDoc => {
        const p = fbDoc.data();
        bList.innerHTML += `
          <div class="admin-list-item">
            <div class="item-info"><h4>${p.title}</h4><p>${p.date} | ${p.author}</p></div>
            <button class="btn-delete" onclick="deleteItem('posts', '${fbDoc.id}')">삭제</button>
          </div>
        `;
      });
    }

    window.deleteItem = async (col, id) => {
      if(!confirm('삭제하시겠습니까?')) return;
      await deleteDoc(doc(db, col, id));
      renderLists();
    };

    renderLists();
  </script>
</body>
</html>
